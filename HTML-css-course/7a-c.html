<!DOCTYPE html>
<html>
   <head>
    <title>Spongebob Thumbnails</title>
    <style>
      .spongebob{
      width: 200px;
      border-radius: 20px;  

      }
      .spongebob2{
      width: 200px;
      height: 200px;
      margin-left: 40px;
      border-style: solid;
      border-color: black;
      }
      .spongebob3{
      width: 200px;
      height: 200px;
      margin-left: 40px;
      border-style: none;
      border-radius: 300px;
      }
    </style>
   </head>
   <body>
    <img class="spongebob" src="spongeBob.png">
    <img class="spongebob2" src="spongeBob.png">
    <img class="spongebob3" src="spongeBob.png">


   </body>
</html>
