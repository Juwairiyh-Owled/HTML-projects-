<!DOCTYPE html>
<html>
   <head>
    <title>Linedin sign up</title>
    <style>
.email{
font-size: 12px;
font-family: Arial;
color: rgb(100, 99, 99);
margin-bottom: 0;
font-weight: bold;

}
.search-bar{
  width: 300px;
  margin-top: 10px;
  height: 21px;
  border-radius: 3px;
  border: solid;
  color: rgb(54, 52, 52);
  border-width: 1.8px;
  }

  .policy{
    font-size: 12px;
    font-family: Arial;
    color: rgb(100, 99, 99);
    margin-bottom: 0;
  }

.agree-button{
background-color: rgb(45, 109, 205);
color: white;
width: 240px;
margin-top: 10px;
height:40px ;
border-radius: 20px;
border: none;
cursor: pointer;
}



    </style>


   </head>
   <body>
    <p class="email">
     Email
   </p>

    <input class="search-bar" type="text">
    <p class="policy">
      By clicking Agree & Join, you agree to the Privacy Policy
    </p>

    <button class="agree-button">
      Agree & Join


    </button>

   </body>
</html>
