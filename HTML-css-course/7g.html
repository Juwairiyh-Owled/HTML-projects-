<!DOCTYPE html>
<html>
   <head>
    <title>
      Twitter textbox
    </title>
    <style>
      .text-twitter{
        font-family: Arial;
        color: rgb(116, 115, 115);
        display: inline-block;
        vertical-align: middle;
      }

.icon{
width: 40px;
border-radius: 20px;
display: inline-block;
vertical-align: middle;
margin-right: 8px;
}

.tweet-button{
background-color: rgb(70, 144, 235);
color: white;
width: 75px;
padding-top: 8px;
padding-bottom: 8px;
padding-left: 5px;
padding-right: 5px;
font-family: Arial;
font-size: 16px;
font-weight: bold;
border: none;
border-radius: 20px;
vertical-align: middle;
display: inline-block;
margin-left: 100px;

}


    </style>
   </head>
   <body>
<img class ="icon" src="spongeBob.png">
<p class = "text-twitter"> What's happening?</p>
<button class = "tweet-button" >Tweet</button>

   </body>
</html>
